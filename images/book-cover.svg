<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 2560" width="1600" height="2560">
  <defs>
    <radialGradient id="bg" cx="40%" cy="22%" r="75%">
      <stop offset="0%" stop-color="#162444"/>
      <stop offset="48%" stop-color="#0b1626"/>
      <stop offset="100%" stop-color="#060d17"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8ab8f8"/>
      <stop offset="35%"  stop-color="#b390f5"/>
      <stop offset="70%"  stop-color="#d98aec"/>
      <stop offset="100%" stop-color="#f5c87a"/>
    </linearGradient>
    <linearGradient id="circuitLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#b390f5" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b390f5" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#b390f5" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="2560" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#b390f5" stroke-width="1">
    <line x1="0" y1="200" x2="1600" y2="200"/><line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="600" x2="1600" y2="600"/><line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="0" y1="1000" x2="1600" y2="1000"/><line x1="0" y1="1200" x2="1600" y2="1200"/>
    <line x1="0" y1="1400" x2="1600" y2="1400"/><line x1="0" y1="1600" x2="1600" y2="1600"/>
    <line x1="0" y1="1800" x2="1600" y2="1800"/><line x1="0" y1="2000" x2="1600" y2="2000"/>
    <line x1="0" y1="2200" x2="1600" y2="2200"/><line x1="0" y1="2400" x2="1600" y2="2400"/>
    <line x1="200" y1="0" x2="200" y2="2560"/><line x1="400" y1="0" x2="400" y2="2560"/>
    <line x1="600" y1="0" x2="600" y2="2560"/><line x1="800" y1="0" x2="800" y2="2560"/>
    <line x1="1000" y1="0" x2="1000" y2="2560"/><line x1="1200" y1="0" x2="1200" y2="2560"/>
    <line x1="1400" y1="0" x2="1400" y2="2560"/>
  </g>

  <!-- Quantum circuit art (upper half) -->
  <!-- Horizontal wires -->
  <g stroke="url(#circuitLine)" stroke-width="2.5" fill="none" opacity="0.55">
    <line x1="100" y1="480" x2="1500" y2="480"/>
    <line x1="100" y1="640" x2="1500" y2="640"/>
    <line x1="100" y1="800" x2="1500" y2="800"/>
    <line x1="100" y1="960" x2="1500" y2="960"/>
    <line x1="100" y1="1120" x2="1500" y2="1120"/>
    <line x1="100" y1="1280" x2="1500" y2="1280"/>
    <line x1="100" y1="1440" x2="1500" y2="1440"/>
  </g>

  <!-- Gate symbols on wires -->
  <g fill="none" filter="url(#softGlow)">
    <!-- H gates (blue-purple) -->
    <rect x="240" y="455" width="80" height="50" rx="6" stroke="#8ab8f8" stroke-width="2.5" fill="#0d1d35" opacity="0.9"/>
    <text x="280" y="488" text-anchor="middle" font-family="monospace" font-size="28" fill="#8ab8f8" opacity="0.95">H</text>
    <rect x="240" y="615" width="80" height="50" rx="6" stroke="#8ab8f8" stroke-width="2.5" fill="#0d1d35" opacity="0.9"/>
    <text x="280" y="648" text-anchor="middle" font-family="monospace" font-size="28" fill="#8ab8f8" opacity="0.95">H</text>
    <rect x="240" y="775" width="80" height="50" rx="6" stroke="#8ab8f8" stroke-width="2.5" fill="#0d1d35" opacity="0.9"/>
    <text x="280" y="808" text-anchor="middle" font-family="monospace" font-size="28" fill="#8ab8f8" opacity="0.95">H</text>
    <rect x="240" y="935" width="80" height="50" rx="6" stroke="#8ab8f8" stroke-width="2.5" fill="#0d1d35" opacity="0.9"/>
    <text x="280" y="968" text-anchor="middle" font-family="monospace" font-size="28" fill="#8ab8f8" opacity="0.95">H</text>

    <!-- CNOT controls -->
    <circle cx="500" cy="480" r="18" fill="#b390f5" opacity="0.9" filter="url(#softGlow)"/>
    <line x1="500" y1="498" x2="500" y2="622" stroke="#b390f5" stroke-width="2.5" opacity="0.7"/>
    <circle cx="500" cy="640" r="24" stroke="#b390f5" stroke-width="2.5" fill="none" opacity="0.9"/>
    <line x1="476" y1="640" x2="524" y2="640" stroke="#b390f5" stroke-width="2.5" opacity="0.9"/>
    <line x1="500" y1="616" x2="500" y2="664" stroke="#b390f5" stroke-width="2.5" opacity="0.9"/>

    <!-- RZ gate (purple) -->
    <rect x="680" y="775" width="90" height="50" rx="6" stroke="#d98aec" stroke-width="2.5" fill="#120d20" opacity="0.9"/>
    <text x="725" y="808" text-anchor="middle" font-family="monospace" font-size="24" fill="#d98aec" opacity="0.95">Rz</text>

    <!-- Measurement gate -->
    <rect x="1100" y="455" width="80" height="50" rx="6" stroke="#f5c87a" stroke-width="2.5" fill="#1a1206" opacity="0.9"/>
    <path d="M1118 490 Q1140 468 1162 490" stroke="#f5c87a" stroke-width="2" fill="none"/>
    <line x1="1140" y1="490" x2="1158" y2="468" stroke="#f5c87a" stroke-width="2"/>

    <!-- More CNOT -->
    <circle cx="880" cy="800" r="18" fill="#b390f5" opacity="0.9"/>
    <line x1="880" y1="818" x2="880" y2="942" stroke="#b390f5" stroke-width="2.5" opacity="0.7"/>
    <circle cx="880" cy="960" r="24" stroke="#b390f5" stroke-width="2.5" fill="none" opacity="0.9"/>
    <line x1="856" y1="960" x2="904" y2="960" stroke="#b390f5" stroke-width="2.5" opacity="0.9"/>
    <line x1="880" y1="936" x2="880" y2="984" stroke="#b390f5" stroke-width="2.5" opacity="0.9"/>

    <!-- T gate -->
    <rect x="680" y="935" width="80" height="50" rx="6" stroke="#7fc4c0" stroke-width="2.5" fill="#0a1818" opacity="0.9"/>
    <text x="720" y="968" text-anchor="middle" font-family="monospace" font-size="28" fill="#7fc4c0" opacity="0.95">T</text>
  </g>

  <!-- Neural network dots (lower circuit area) -->
  <g fill="#b390f5" opacity="0.3" filter="url(#softGlow)">
    <circle cx="200" cy="1700" r="12"/>
    <circle cx="200" cy="1800" r="12"/>
    <circle cx="200" cy="1900" r="12"/>
    <circle cx="200" cy="2000" r="12"/>
    <circle cx="600" cy="1720" r="14"/>
    <circle cx="600" cy="1840" r="14"/>
    <circle cx="600" cy="1960" r="14"/>
    <circle cx="1000" cy="1760" r="16"/>
    <circle cx="1000" cy="1880" r="16"/>
    <circle cx="1400" cy="1820" r="18"/>
  </g>
  <g stroke="#b390f5" stroke-width="1" opacity="0.12">
    <line x1="200" y1="1700" x2="600" y2="1720"/>
    <line x1="200" y1="1700" x2="600" y2="1840"/>
    <line x1="200" y1="1700" x2="600" y2="1960"/>
    <line x1="200" y1="1800" x2="600" y2="1720"/>
    <line x1="200" y1="1800" x2="600" y2="1840"/>
    <line x1="200" y1="1800" x2="600" y2="1960"/>
    <line x1="200" y1="1900" x2="600" y2="1720"/>
    <line x1="200" y1="1900" x2="600" y2="1840"/>
    <line x1="200" y1="1900" x2="600" y2="1960"/>
    <line x1="200" y1="2000" x2="600" y2="1720"/>
    <line x1="200" y1="2000" x2="600" y2="1840"/>
    <line x1="200" y1="2000" x2="600" y2="1960"/>
    <line x1="600" y1="1720" x2="1000" y2="1760"/>
    <line x1="600" y1="1720" x2="1000" y2="1880"/>
    <line x1="600" y1="1840" x2="1000" y2="1760"/>
    <line x1="600" y1="1840" x2="1000" y2="1880"/>
    <line x1="600" y1="1960" x2="1000" y2="1760"/>
    <line x1="600" y1="1960" x2="1000" y2="1880"/>
    <line x1="1000" y1="1760" x2="1400" y2="1820"/>
    <line x1="1000" y1="1880" x2="1400" y2="1820"/>
  </g>

  <!-- Divider line -->
  <line x1="160" y1="1550" x2="1440" y2="1550" stroke="url(#circuitLine)" stroke-width="1.5" opacity="0.35"/>

  <!-- Series badge -->
  <rect x="580" y="270" width="440" height="46" rx="23" fill="none" stroke="rgba(179,144,245,0.35)" stroke-width="1.5"/>
  <text x="800" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="20" letter-spacing="4" fill="rgba(179,144,245,0.7)" font-weight="500">HANDS-ON AI SCIENCE</text>

  <!-- Title block -->
  <text x="800" y="1630" text-anchor="middle" font-family="Georgia, serif" font-size="104" font-weight="700" letter-spacing="2" fill="url(#titleGrad)" filter="url(#glow)">Building</text>
  <text x="800" y="1750" text-anchor="middle" font-family="Georgia, serif" font-size="104" font-weight="700" letter-spacing="2" fill="url(#titleGrad)" filter="url(#glow)">Quantum AI</text>

  <!-- Subtitle -->
  <text x="800" y="1850" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="rgba(220,229,238,0.72)" letter-spacing="1">From Qubits to Quantum Machine Learning</text>

  <!-- Separator -->
  <line x1="680" y1="1920" x2="920" y2="1920" stroke="rgba(179,144,245,0.35)" stroke-width="1.5"/>
  <circle cx="800" cy="1920" r="4" fill="rgba(179,144,245,0.5)"/>

  <!-- Author -->
  <text x="800" y="1980" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="rgba(220,229,238,0.75)" letter-spacing="1">Alexander (Sasha) Apartsin, Ph.D.</text>

  <!-- Bottom bar -->
  <rect x="0" y="2490" width="1600" height="70" fill="rgba(0,0,0,0.35)"/>
  <text x="800" y="2535" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="rgba(220,229,238,0.45)" letter-spacing="3">FIRST EDITION · 2026</text>
</svg>
